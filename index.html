 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bava 💍</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
}

html {
    scroll-behavior: smooth;
}

/* Each section full screen */
.page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* Backgrounds for each section */
.page1 { background: url('bg1.png') center/cover no-repeat; }
.page2 { background: url('bg2.jpg') center/cover no-repeat; }
.page3 { background: url('bg3.jpg') center/cover no-repeat; }
.page4 { background: url('bg4.jpg') center/cover no-repeat; }
.page5 { background: url('bg5.jpg') center/cover no-repeat; }
.page6 { background: url('bg5.jpg') center/cover no-repeat; }

/* Dark overlay */
.page::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 0;
}

/* Content above overlay */
.page * {
    position: relative;
    z-index: 1;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: #fff;
    color: #ff4d6d;
    cursor: pointer;
}

/* Floating hearts */
.heart {
    position: fixed;
    color: #ff4d6d;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Slideshow */
.slideshow img {
    width: 250px;
    border-radius: 15px;
    margin: 10px;
    display: none;
}
</style>
</head>

<body>

<!-- Page 1 -->
<section class="page page1">
    <h1>Hey Bava ❤️</h1>
    <p>I have something to tell you...</p>
</section>

<!-- Page 2 -->
<section class="page page2">
    <h1>You know what? 🥹</h1>
    <p>Life became so beautiful after you came into it 💫</p>
</section>

<!-- Page 3 -->
<section class="page page3">
    <h1>Don’t scroll fast 😈</h1>
    <p>Something special is coming...</p>
</section>

<!-- Page 4 -->
<section class="page page4">
    <h1>💍 We are ENGAGED ❤️</h1>
</section>

<!-- Page 5 -->
<section class="page page5">
    <h1>Congratulations Bava 🎉</h1>
    <p>We are getting married soon 💖</p>
</section>

<!-- Page 6 -->
<section class="page page6">
    <h1>Our Beautiful Journey 📸</h1>

    <div class="slideshow">
        <img src="photo1.jpg" class="slide">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
    </div>

    <p>I love you forever ❤️</p>
</section>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* Floating hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}
setInterval(createHeart, 500);

/* Slideshow */
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");

function showSlides() {
    slides.forEach(s => s.style.display = "none");
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 2000);
}
showSlides();
</script>

</body>
</html>
