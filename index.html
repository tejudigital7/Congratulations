 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bava 💍</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    transition: background 1s ease-in-out;
}

/* Overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0,0,0,0.5);
}

/* Pages */
.page {
    display: none;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    padding: 20px;
}

.active {
    display: flex;
}

/* Button */
button {
    margin-top: 25px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #fff;
    color: #ff4d6d;
    cursor: pointer;
}

/* Typing */
.typing {
    font-size: 1.5em;
    border-right: 2px solid #fff;
    white-space: nowrap;
    overflow: hidden;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Slideshow */
.slide {
    display: none;
    width: 250px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Page 1 -->
<div class="page active">
    <h1>Hey Bava ❤️</h1>
    <p>I have something to tell you...</p>
    <button onclick="start()">Click here 👀</button>
</div>

<!-- Page 2 -->
<div class="page">
    <div id="text"></div>
    <button onclick="next()">Next ➡️</button>
</div>

<!-- Page 3 -->
<div class="page">
    <h1>Don’t click this 😈</h1>
    <button onclick="fun()">Click anyway</button>
</div>

<!-- Page 4 -->
<div class="page">
    <h1>💍 We are ENGAGED ❤️</h1>
    <button onclick="next()">Next ➡️</button>
</div>

<!-- Page 5 -->
<div class="page">
    <h1>Congratulations Bava 🎉</h1>
    <p>We are getting married soon 💖</p>
    <button onclick="next()">Last surprise 👇</button>
</div>

<!-- Page 6 -->
<div class="page">
    <h1>Our Beautiful Journey 📸</h1>
    <img src="photo1.jpg" class="slide">
    <img src="photo2.jpg" class="slide">
    <img src="photo3.jpg" class="slide">
    <p>I love you forever ❤️</p>
</div>

<script>
let i = 0;
const pages = document.querySelectorAll(".page");

const bg = [
    "url('bg1.png')",
    "url('bg2.jpg')",
    "url('bg3.jpg')",
    "url('bg4.jpg')",
    "url('bg5.jpg')",
    "url('bg5.jpg')"
];

document.body.style.backgroundImage = bg[0];

/* Start */
function start() {
    document.getElementById("music").play();
    next();
    typeText("Life became so beautiful after you came into it 💫");
}

/* Typing */
function typeText(text) {
    let j = 0;
    let el = document.getElementById("text");
    el.innerHTML = "";

    function type() {
        if (j < text.length) {
            el.innerHTML += text.charAt(j);
            j++;
            setTimeout(type, 50);
        }
    }
    type();
}

/* Next page */
function next() {
    pages[i].classList.remove("active");
    i++;
    pages[i].classList.add("active");
    document.body.style.backgroundImage = bg[i];
}

/* Fun button */
function fun() {
    alert("😜 I knew it!");
    next();
}

/* Hearts */
setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "❤️";
    h.className = "heart";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random()*20+20)+"px";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),6000);
},500);

/* Slideshow */
let s = 0;
const slides = document.querySelectorAll(".slide");

setInterval(() => {
    slides.forEach(img => img.style.display="none");
    s++;
    if (s > slides.length) s = 1;
    slides[s-1].style.display = "block";
},2000);
</script>

</body>
</html>
