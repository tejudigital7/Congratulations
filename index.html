 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bava 💍</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #fff;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background 1s ease-in-out;
    overflow: hidden;
}

.overlay {
    background: rgba(0,0,0,0.5);
    height: 100vh;
    width: 100%;
    position: fixed;
    top: 0;
    left: 0;
}

.page {
    display: none;
    position: relative;
    z-index: 2;
    margin-top: 120px;
}

.active {
    display: block;
}

/* Buttons */
button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #fff;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ffe6ea;
}

/* Typing effect */
.typing {
    font-size: 1.5em;
    width: 80%;
    margin: auto;
    border-right: 2px solid #fff;
    white-space: nowrap;
    overflow: hidden;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Slideshow */
.slideshow img {
    width: 250px;
    border-radius: 15px;
    margin: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Page 1 -->
<div class="page active">
    <h1>Hey Bava ❤️</h1>
    <p>I have something to tell you...</p>
    <button onclick="startExperience()">Click here 👀</button>
</div>

<!-- Page 2 -->
<div class="page">
    <div id="text1" class="typing"></div>
    <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- Page 3 -->
<div class="page">
    <h1>Don’t click this 😈</h1>
    <button onclick="reveal()">Click anyway</button>
</div>

<!-- Page 4 -->
<div class="page">
    <h1>💍 We are ENGAGED ❤️</h1>
    <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- Page 5 -->
<div class="page">
    <h1>Congratulations Bava 🎉</h1>
    <p>We are getting married soon 💖</p>
    <button onclick="nextPage()">Last surprise 👇</button>
</div>

<!-- Page 6 (Slideshow) -->
<div class="page">
    <h1>Our Beautiful Journey 📸</h1>

    <div class="slideshow">
        <img src="photo1.jpg" class="slide">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
    </div>

    <p>I love you forever ❤️</p>
</div>

<script>
let currentPage = 0;
const pages = document.querySelectorAll('.page');

const backgrounds = [
    "url('bg1.png')",
    "url('bg2.jpg')",
    "url('bg3.jpg')",
    "url('bg4.jpg')",
    "url('bg5.jpg')",
    "url('bg5.jpg')"
];

document.body.style.backgroundImage = backgrounds[0];

/* Start + music */
function startExperience() {
    document.getElementById("music").play();
    nextPage();
    typeText("text1", "Life became so beautiful after you came into it 💫");
}

/* Typing effect */
function typeText(id, text) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            document.getElementById(id).innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();
}

/* Next page */
function nextPage() {
    pages[currentPage].classList.remove('active');
    currentPage++;
    pages[currentPage].classList.add('active');
    document.body.style.backgroundImage = backgrounds[currentPage];
}

/* Naughty button reveal */
function reveal() {
    alert("Hehe 😜 I knew you will click!");
    nextPage();
}

/* Floating hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}
setInterval(createHeart, 500);

/* Slideshow */
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");

function showSlides() {
    slides.forEach(s => s.style.display = "none");
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 2000);
}
showSlides();
</script>

</body>
</html>
