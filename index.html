 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bava 💍</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #fff;
    transition: background 1s ease-in-out;
    background-size: cover;
    background-position: center;
}

/* Overlay for readability */
.overlay {
    background: rgba(0,0,0,0.5);
    height: 100vh;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
}

.page {
    display: none;
    position: relative;
    z-index: 2;
    margin-top: 120px;
    animation: fadeIn 1.5s;
}

.active {
    display: block;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #fff;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ffe6ea;
}

img {
    width: 250px;
    border-radius: 15px;
    margin: 10px;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

</head>

<body>

<div class="overlay"></div>

<!-- Page 1 -->
<div class="page active">
    <h1>Hey Bava ❤️</h1>
    <p>I have something to tell you...</p>
    <button onclick="nextPage()">Click here 👀</button>
</div>

<!-- Page 2 -->
<div class="page">
    <h1>You know what? 🥹</h1>
    <p>Life became so beautiful after you came into it 💫</p>
    <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- Page 3 -->
<div class="page">
    <h1>And now… 💍</h1>
    <p>We are officially ENGAGED ❤️</p>
    <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- Page 4 -->
<div class="page">
    <h1>Congratulations Bava 🎉</h1>
    <p>We are getting married soon 💖</p>
    <button onclick="nextPage()">One last thing 👇</button>
</div>

<!-- Page 5 (Photos) -->
<div class="page">
    <h1>Our Beautiful Moment 📸</h1>

    <!-- ADD YOUR IMAGES HERE -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">

    <p>
        This is just the beginning of our forever 💕<br><br>
        I love you Bava ❤️
    </p>
</div>

<script>
let currentPage = 0;
const pages = document.querySelectorAll('.page');

const backgrounds = [
    "url('bg1.jpg')",
    "url('bg2.jpg')",
    "url('bg3.jpg')",
    "url('bg4.jpg')",
    "url('bg5.jpg')"
];

document.body.style.backgroundImage = backgrounds[0];

function nextPage() {
    pages[currentPage].classList.remove('active');
    currentPage++;
    pages[currentPage].classList.add('active');

    document.body.style.backgroundImage = backgrounds[currentPage];
}
</script>

</body>
</html>
